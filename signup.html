<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - CarFinder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo"><i class="fas fa-car"></i> CarFinder</div>
        <nav>
            <a href="index.html" class="nav-btn"><i class="fas fa-home"></i> Home</a>
            <a href="login.html" class="nav-btn"><i class="fas fa-sign-in-alt"></i> Login</a>
        </nav>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <h2><i class="fas fa-user-plus"></i> Create Account</h2>
            <form onsubmit="signup(event)">
                <input id="signup-name" placeholder="Full Name" required>
                <input id="signup-email" type="email" placeholder="Email" required>
                <input id="signup-password" type="password" placeholder="Password" required>
                <input id="signup-confirm" type="password" placeholder="Confirm Password" required>
                <select id="signup-role">
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
                <button class="btn"><i class="fas fa-user-plus"></i> Create Account</button>
            </form>
            <p class="auth-text">Already have an account? <a href="login.html">Login</a></p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
