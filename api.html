<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Explorer - Country Information App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌍 World Explorer</h1>
            <p>Discover information about any country in the world!</p>       
            <nav style="margin-top: 20px;">
                <a href="saved-items.html" style="color: white; text-decoration: none; padding: 8px 20px; background: rgba(255,255,255,0.2); border-radius: 20px; display: inline-block;">⭐ View Saved Countries</a>
            </nav>
        </header>

        <main>
            <div class="search-section">
                <label for="countryInput">Enter a country name:</label>
                <div class="search-box">
                    <input 
                        type="text" 
                        id="countryInput" 
                        placeholder="e.g., Philippines, Japan, Brazil"
                        autocomplete="off"
                    >
                    <button id="searchBtn">Search</button>
                </div>
                <p class="hint">Try: Philippines, Japan, France, Brazil</p>
            </div>

            <div id="result" class="result-container">
                <!-- Results will be displayed here -->
            </div>

            <div id="error" class="error-container">
                <!-- Error messages will be displayed here -->
            </div>

            <div class="examples-section">
                <h3>Popular Countries:</h3>
                <div class="example-buttons">
                    <button class="example-country" data-country="Philippines">🇵🇭 Philippines</button>
                    <button class="example-country" data-country="Japan">🇯🇵 Japan</button>
                    <button class="example-country" data-country="France">🇫🇷 France</button>
                    <button class="example-country" data-country="Brazil">🇧🇷 Brazil</button>
                    <button class="example-country" data-country="Australia">🇦🇺 Australia</button>
                </div>
            </div>
        </main>

        <footer>
            <p>Data provided by <a href="https://restcountries.com/" target="_blank">REST Countries API</a></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
