<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CarFinder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo"><i class="fas fa-car"></i> CarFinder</div>
        <nav>
            <a href="index.html" class="nav-btn"><i class="fas fa-home"></i> Home</a>
            <a href="signup.html" class="nav-btn"><i class="fas fa-user-plus"></i> Sign Up</a>
        </nav>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <h2><i class="fas fa-sign-in-alt"></i> Login</h2>
            <form onsubmit="login(event)">
                <input id="login-email" type="email" placeholder="Email" required>
                <input id="login-password" type="password" placeholder="Password" required>
                <button class="btn"><i class="fas fa-sign-in-alt"></i> Login</button>
            </form>
            <p class="auth-text">Don't have an account? <a href="signup.html">Sign Up</a></p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
