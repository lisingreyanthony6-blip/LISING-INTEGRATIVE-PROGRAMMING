<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - CarFinder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body onload="loadProfile()">
    <header>
        <div class="logo"><i class="fas fa-car"></i> CarFinder</div>
        <nav>
            <a href="index.html" class="nav-btn"><i class="fas fa-home"></i> Home</a>
            <button onclick="logout()" class="nav-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </nav>
    </header>

    <main class="dashboard">
        <section class="profile-card">
            <div class="profile-header">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Car" alt="User Avatar" class="avatar" id="profile-avatar">
                <div class="profile-title">
                    <h2 id="profile-name"></h2>
                    <span class="role-badge" id="profile-role-badge">👤 User</span>
                </div>
            </div>
            <div class="profile-details">
                <div class="detail-item"><i class="fas fa-envelope"></i><div><label>Email</label><p id="profile-email"></p></div></div>
                <div class="detail-item"><i class="fas fa-map-marker-alt"></i><div><label>Address</label><p id="profile-address"></p></div></div>
            </div>
            <div class="profile-actions">
                <a href="settings.html" class="btn settings-btn"><i class="fas fa-cog"></i> Settings</a>
                <button id="adminBtn" class="btn settings-btn" style="display: none"><i class="fas fa-crown"></i> Admin Dashboard</button>
                <a href="saved-vehicles.html" class="btn settings-btn"><i class="fas fa-garage"></i> My Garage</a>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
