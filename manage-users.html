<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - CarFinder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body onload="loadUsers()">
    <header>
        <div class="logo"><i class="fas fa-users-cog"></i> Manage Users</div>
        <nav>
            <a href="admin.html" class="nav-btn"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <button onclick="logout()" class="nav-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </nav>
    </header>

    <main class="dashboard">
        <section class="settings-card add-user-card">
            <h2><i class="fas fa-user-plus"></i> Add New User</h2>
            <form onsubmit="addUser(event)" class="settings-form">
                <div class="input-group"><i class="fas fa-user input-icon"></i><input id="new-name" placeholder="Full Name" required></div>
                <div class="input-group"><i class="fas fa-envelope input-icon"></i><input id="new-email" type="email" placeholder="Email" required></div>
                <div class="input-group"><i class="fas fa-lock input-icon"></i><input id="new-password" type="password" placeholder="Password" required></div>
                <div class="input-group"><i class="fas fa-user-tag input-icon"></i><select id="new-role"><option value="user">👤 User</option><option value="admin">👑 Admin</option></select></div>
                <button class="btn btn-primary"><i class="fas fa-plus-circle"></i> Create User</button>
            </form>
        </section>

        <section class="settings-card user-list-card">
            <h2><i class="fas fa-list"></i> User List</h2>
            <div class="table-container">
                <table class="user-table">
                    <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Actions</th></tr></thead>
                    <tbody id="userTable"></tbody>
                </table>
            </div>
            <div class="user-stats" id="userStats"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
